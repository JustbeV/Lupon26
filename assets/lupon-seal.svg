<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 680 680">
  <defs>
    <style>
      .seal-text { font-family: 'Segoe UI', Arial, sans-serif; fill: #C9A84C; font-weight: 700; }
      .seal-sub  { font-family: 'Segoe UI', Arial, sans-serif; fill: #B8972E; font-weight: 600; font-size: 12px; }
      .seal-inner{ font-family: 'Segoe UI', Arial, sans-serif; fill: #FDF8F0; font-weight: 700; }
    </style>
  </defs>

  <!-- outer dark bg -->
  <circle cx="340" cy="340" r="295" fill="#0d2137"/>

