  <circle cx="340" cy="340" r="282" fill="none" stroke="#8A6A1C" stroke-width="1"/>
  <circle cx="340" cy="340" r="272" fill="none" stroke="#C9A84C" stroke-width="1.5"/>

  <!-- dot ring -->
  <circle cx="340" cy="52"  r="3.5" fill="#C9A84C"/>
  <circle cx="397" cy="56"  r="3.5" fill="#C9A84C"/>
  <circle cx="451" cy="68"  r="3.5" fill="#C9A84C"/>
  <circle cx="500" cy="88"  r="3.5" fill="#C9A84C"/>
  <circle cx="544" cy="116" r="3.5" fill="#C9A84C"/>
  <circle cx="580" cy="151" r="3.5" fill="#C9A84C"/>
  <circle cx="607" cy="191" r="3.5" fill="#C9A84C"/>
  <circle cx="625" cy="236" r="3.5" fill="#C9A84C"/>
  <circle cx="633" cy="284" r="3.5" fill="#C9A84C"/>
